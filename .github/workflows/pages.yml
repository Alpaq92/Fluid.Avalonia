name: Deploy live demo to GitHub Pages

# Builds the Fluid.Avalonia.Demo WebAssembly head and publishes it to GitHub Pages.
# Enable once in the repo: Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, and let an in-progress production deploy COMPLETE rather than
# cancelling it. A burst of pushes to main (e.g. several dependabot merges plus a release) would
# otherwise supersede each other's deploys mid-run ("Canceling since a higher priority waiting request
# for pages exists"). Runs still queue so the newest content wins; only intermediate queued runs are
# skipped. Mirrors GitHub's official Pages workflow template.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          # Use the SDK pinned in global.json so the WASM build is reproducible — a floating
          # 10.0.x would let runner-image bumps churn every fingerprint+hash on unrelated re-runs.
          global-json-file: global.json

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Publish Browser head
        run: dotnet publish Fluid.Avalonia.Demo.Browser/Fluid.Avalonia.Demo.Browser.csproj -c Release -o publish

      - name: Disable Jekyll (keep _framework, leading-underscore files)
        run: touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
