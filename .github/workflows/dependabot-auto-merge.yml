name: Dependabot auto-merge

# Dependabot NuGet PRs merge as soon as required checks pass (no cool-off).
# github-actions bumps are chore(deps): and don't trigger a release; they still
# merge ASAP via the same path.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # PAT preferred so the squashed merge commit fires release.yml
          # (GITHUB_TOKEN merges don't trigger downstream workflows).
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
